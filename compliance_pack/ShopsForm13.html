<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORM 13 - Leave Book</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 12px;
            font-size: 9px;
        }
        .form-container {
            border: 1px solid black;
            padding: 10px;
            margin: 0 auto;
            width: 99%;
        }
        .form-header {
            text-align: center;
            margin-bottom: 10px;
            font-size: 10px;
        }
        .form-header div {
            margin: 2px 0;
        }
        .header-title {
            font-weight: bold;
        }
        .employee-info {
            margin-bottom: 8px;
            font-size: 9px;
        }
        .info-row {
            margin-bottom: 3px;
            display: flex;
            align-items: center;
        }
        .info-label {
            font-weight: bold;
            width: 7%;
            margin-right: 5px;
        }
        .info-value {
            flex: 1;
            padding-left: 3px;
        }
        .info-line {
            flex: 1;
            border-bottom: 1px solid black;
            height: 10px;
            padding-left: 3px;
        }
        .register-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 8px;
            margin-bottom: 10px;
            table-layout: fixed;
        }
        .register-table th,
        .register-table td {
            border: 1px solid black;
            padding: 3px;
            text-align: center;
            vertical-align: middle;
            height: 16px;
            word-wrap: break-word;
            word-break: break-word;
        }
        .register-table th {
            font-weight: bold;
            background-color: #fff;
            line-height: 1.1;
        }
        .register-table td {
            text-align: left;
        }
        .col-sl {
            width: 5%;
        }
        .col-year {
            width: 8%;
        }
        .col-credit {
            width: 14%;
        }
        .col-earned {
            width: 14%;
        }
        .col-total {
            width: 14%;
        }
        .col-from {
            width: 10%;
        }
        .col-to {
            width: 10%;
        }
        .col-days {
            width: 10%;
        }
        .col-balance {
            width: 10%;
        }
        .col-remarks {
            width: 15%;
        }
        .text-center {
            text-align: center;
        }
        .footer-section {
            margin-top: 10px;
            font-size: 9px;
        }
        .footer-row {
            margin-bottom: 3px;
            display: flex;
            align-items: center;
        }
        .footer-label {
            font-weight: bold;
            width: 9%;
            margin-right: 5px;
        }
        .footer-line {
            flex: 1;
            border-bottom: 1px solid black;
            height: 10px;
            padding-left: 3px;
        }
        .page-break {
            page-break-after: always;
        }
    </style>
</head>
<body>
        <div class="form-container">
        <div class="form-header">
            <div>Tamil Nadu Shops and Establishments Rules</div>
            <div class="header-title">FORM 13</div>
            <div class="header-title">LEAVE BOOK</div>
        </div>
        <p style="text-align: center; margin-top: 20px;">No leave records found for the selected period.</p>
    </div>
    </body>
</html>
