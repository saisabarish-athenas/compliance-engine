<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORM XIX - Wage Slip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 20px;
        }
        .form-container {
            border: 2px solid black;
            padding: 15px;
            margin: 0 auto;
            width: 95%;
            max-width: 900px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .form-header div {
            margin: 3px 0;
        }
        .header-title {
            font-weight: bold;
        }
        .header-fields {
            margin-bottom: 15px;
            font-size: 11px;
        }
        .header-row {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }
        .header-label {
            font-weight: bold;
            width: 35%;
            margin-right: 10px;
        }
        .header-value {
            flex: 1;
            border-bottom: 1px dotted black;
            padding: 2px 4px;
            min-height: 18px;
        }
        .column-numbers {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
            margin-bottom: 0;
        }
        .column-numbers td {
            border: 1px solid black;
            padding: 4px 2px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            height: 20px;
        }
        .wage-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid black;
            font-size: 11px;
            margin-bottom: 15px;
        }
        .wage-table th,
        .wage-table td {
            border: 1px solid black;
            padding: 6px 4px;
            text-align: left;
            vertical-align: middle;
            font-size: 10px;
        }
        .wage-table th {
            font-weight: bold;
            background-color: #fff;
            word-wrap: break-word;
            line-height: 1.2;
        }
        .wage-table td {
            height: 30px;
        }
        .col-1 { width: 14%; }
        .col-2 { width: 14%; text-align: center; }
        .col-3 { width: 14%; text-align: right; }
        .col-4 { width: 14%; text-align: right; }
        .col-5 { width: 14%; text-align: right; }
        .col-6 { width: 14%; text-align: right; }
        .col-7 { width: 16%; text-align: right; }
        .signature-section {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            font-size: 11px;
        }
        .signature-block {
            text-align: center;
            width: 200px;
        }
        .signature-label {
            margin-top: 50px;
            font-size: 10px;
            line-height: 1.4;
        }
        .signature-space {
            margin-top: 20px;
        }
        .page-break {
            page-break-after: always;
        }
    </style>
</head>
<body>
    </body>
</html>

</head>
</html>
