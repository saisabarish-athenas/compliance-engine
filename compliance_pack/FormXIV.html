<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FORM XIV - Employment Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 20px;
        }
        .form-container {
            border: 2px solid black;
            padding: 20px;
            margin: 0 auto;
            width: 90%;
            max-width: 800px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 12px;
        }
        .form-header div {
            margin: 3px 0;
        }
        .header-title {
            font-weight: bold;
            font-size: 13px;
        }
        .header-rule {
            font-size: 10px;
        }
        .two-column-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 11px;
        }
        .column {
            flex: 1;
        }
        .field-row {
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .field-label {
            font-weight: bold;
            display: inline;
        }
        .dot-line {
            border-bottom: 1px dotted #000;
            display: inline-block;
            width: 65%;
            height: 12px;
            margin-left: 5px;
            vertical-align: bottom;
        }
        .detail-section {
            margin-top: 20px;
            font-size: 11px;
        }
        .detail-row {
            margin-bottom: 14px;
            line-height: 1.4;
        }
        .detail-number {
            font-weight: bold;
            display: inline;
            width: 3%;
        }
        .detail-label {
            display: inline;
        }
        .detail-dot-line {
            border-bottom: 1px dotted #000;
            display: inline-block;
            width: 60%;
            height: 12px;
            margin-left: 5px;
            vertical-align: bottom;
        }
        .signature-section {
            margin-top: 40px;
            text-align: right;
            font-size: 11px;
        }
        .signature-line {
            margin-top: 50px;
            border-top: 1px solid #000;
            width: 200px;
            margin-left: auto;
        }
        .signature-label {
            margin-top: 3px;
            font-weight: bold;
        }
        .signature {
            text-align: right;
            margin-top: 40px;
        }
        .sign-line {
            width: 200px;
            border-bottom: 1px solid black;
            margin-left: auto;
            margin-bottom: 5px;
        }
        .page-break {
            page-break-after: always;
        }
    </style>
</head>
<body>
            <div class="form-container">
            <div class="form-header">
                <div class="header-title">FORM XIV</div>
                <div class="header-rule">[See Rule 76]</div>
                <div class="header-title">Employment Card</div>
            </div>
            <p style="text-align: center; margin-top: 40px; font-size: 12px;">No employment records found for the selected period.</p>
        </div>
    </body>
</html>
